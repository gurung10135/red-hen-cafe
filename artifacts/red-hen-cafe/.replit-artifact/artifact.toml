kind = "web"
previewPath = "/"
title = "The Red Hen Café & Bakery"
version = "1.0.0"
id = "artifacts/red-hen-cafe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21226

[services.development]
run = "pnpm --filter @workspace/red-hen-cafe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/red-hen-cafe", "run", "build" ]
publicDir = "artifacts/red-hen-cafe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21226"
BASE_PATH = "/"
